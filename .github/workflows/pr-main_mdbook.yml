name: Publish ethlambda docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/pr-main_mdbook.yml"
  pull_request:
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/pr-main_mdbook.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.2"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo install
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      # mdbook-linkcheck2 runs as part of `mdbook build` and fails the build
      # on broken internal links (see book.toml `warning-policy = "error"`).
      - name: Install mdbook-linkcheck2
        run: cargo install --version 0.12.0 --locked mdbook-linkcheck2

      - name: Build documentation
        run: make docs

      - name: Upload docs artifact
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: book/html
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: book/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: book/html
          destination_dir: .
