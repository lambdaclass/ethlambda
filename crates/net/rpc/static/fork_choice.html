<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ethlambda Fork Choice</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #info-bar {
      display: flex;
      gap: 24px;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
    }

    #info-bar .label {
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #info-bar .value {
      font-size: 14px;
      font-weight: bold;
    }

    #info-bar .item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #follow-head-toggle {
      margin-left: auto;
      padding: 7px 12px;
      border: 1px solid #ff9800;
      border-radius: 4px;
      background: transparent;
      color: #ff9800;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    #follow-head-toggle:hover {
      background: rgba(255, 152, 0, 0.12);
    }

    #follow-head-toggle[aria-pressed="false"] {
      border-color: #666;
      color: #aaa;
    }

    .value-head { color: #ff9800; }
    .value-justified { color: #2196f3; }
    .value-finalized { color: #4caf50; }
    .value-validators { color: #e0e0e0; }

    #legend {
      display: flex;
      gap: 12px;
      margin-left: auto;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #chart-container {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    svg {
      display: block;
    }

    .link {
      fill: none;
      stroke: #444;
      stroke-width: 1.5;
    }

    .node-outer {
      fill: none;
      stroke-width: 2;
      cursor: pointer;
    }

    .halo {
      fill: none;
      stroke-width: 2;
      pointer-events: none;
    }

    .node-inner {
      stroke: none;
      pointer-events: none;
    }

    .node-hit {
      fill: transparent;
      stroke: none;
      cursor: pointer;
    }

    .fill-mask {
      fill: #1a1a2e;
      stroke: none;
      pointer-events: none;
    }

    .node-label {
      fill: #ccc;
      font-size: 10px;
      text-anchor: middle;
      pointer-events: none;
    }

    .tooltip {
      position: fixed;
      background: #16213e;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: "Courier New", Courier, monospace;
      color: #e0e0e0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      line-height: 1.6;
    }

    .tooltip .tt-label {
      color: #888;
    }

    #empty-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #666;
      display: none;
    }

    .slot-axis-label {
      fill: #555;
      font-size: 10px;
      text-anchor: end;
    }
  </style>
</head>
<body>
  <div id="info-bar">
    <div class="item">
      <span class="label">Head Slot</span>
      <span class="value value-head" id="head-slot">--</span>
    </div>
    <div class="item">
      <span class="label">Justified Slot</span>
      <span class="value value-justified" id="justified-slot">--</span>
    </div>
    <div class="item">
      <span class="label">Finalized Slot</span>
      <span class="value value-finalized" id="finalized-slot">--</span>
    </div>
    <div class="item">
      <span class="label">Validators</span>
      <span class="value value-validators" id="validator-count">--</span>
    </div>
    <div id="legend" aria-label="Block color legend">
      <div class="legend-item"><span class="legend-swatch" style="background: #4caf50;"></span>Finalized</div>
      <div class="legend-item"><span class="legend-swatch" style="background: #2196f3;"></span>Justified</div>
      <div class="legend-item"><span class="legend-swatch" style="background: #ffeb3b;"></span>Safe target</div>
      <div class="legend-item"><span class="legend-swatch" style="background: #ff9800;"></span>Head</div>
    </div>
    <button id="follow-head-toggle" type="button" aria-pressed="true">Following Head</button>
  </div>

  <div id="chart-container">
    <div id="empty-message">Waiting for blocks...</div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const POLL_INTERVAL = 2000;
    const MARGIN = { top: 40, right: 60, bottom: 140, left: 80 };
    const SLOT_HEIGHT = 120;
    const MAX_SLOT_HEIGHT = 200;
    const NODE_RADIUS = 16;
    const INNER_RADIUS = NODE_RADIUS - 3;
    const TRANSITION_DURATION = 500;

    const COLORS = {
      finalized: "#4caf50",
      justified: "#2196f3",
      safeTarget: "#ffeb3b",
      head: "#ff9800",
      default: "#666"
    };

    const ROLE_LABELS = {
      finalized: "finalized",
      justified: "justified",
      safeTarget: "safe target",
      head: "head"
    };

    // Concentric halos drawn outside the primary ring, one per secondary role.
    const HALO_OFFSETS = [6, 12, 18];
    const MAX_HALO_OFFSET = HALO_OFFSETS[HALO_OFFSETS.length - 1];
    // Reserve label space below the outermost halo so the gap between the
    // outermost circle and the label stays constant across all nodes,
    // regardless of how many halos are drawn.
    const LABEL_DY = NODE_RADIUS + MAX_HALO_OFFSET + 14;

    const container = document.getElementById("chart-container");
    const tooltip = document.getElementById("tooltip");
    const emptyMsg = document.getElementById("empty-message");
    const followHeadToggle = document.getElementById("follow-head-toggle");

    let svg, gLinks, gNodes, gAxis;
    let currentData = null;
    let followHead = true;
    let currentHeadScrollTarget = null;
    let lastScrollTop = 0;
    let programmaticScrollTimeout = null;
    let isProgrammaticScroll = false;

    function initSVG() {
      svg = d3.select("#chart-container")
        .append("svg")
        .attr("width", "100%");

      gAxis = svg.append("g").attr("class", "axis-group");
      gLinks = svg.append("g").attr("class", "links-group");
      gNodes = svg.append("g").attr("class", "nodes-group");
    }

    function truncateRoot(root) {
      if (!root) return "0x??";
      return root.length > 10 ? root.slice(0, 10) : root;
    }

    // Returns the roles that apply to a block, in natural priority order
    // (strongest commitment first). The first entry drives the primary color;
    // the rest become halos around it.
    function nodeRoles(node, data) {
      const roles = [];
      if (node.slot <= data.finalized.slot)  roles.push("finalized");
      if (node.root === data.justified.root) roles.push("justified");
      if (node.root === data.safe_target)    roles.push("safeTarget");
      if (node.root === data.head)           roles.push("head");
      return roles;
    }

    function weightRatio(node, validatorCount) {
      if (!validatorCount) return 0;
      return Math.max(0, Math.min(1, node.weight / validatorCount));
    }

    function isGenesisParent(parentRoot) {
      if (!parentRoot) return true;
      return /^0x0+$/.test(parentRoot);
    }

    function buildTree(nodes) {
      const nodeMap = new Map();
      nodes.forEach(n => nodeMap.set(n.root, { ...n, children: [] }));

      let rootNode = null;

      nodes.forEach(n => {
        const treeNode = nodeMap.get(n.root);
        if (isGenesisParent(n.parent_root) || !nodeMap.has(n.parent_root)) {
          if (!rootNode || n.slot < rootNode.slot) {
            rootNode = treeNode;
          }
        } else {
          const parent = nodeMap.get(n.parent_root);
          if (parent) {
            parent.children.push(treeNode);
          }
        }
      });

      if (!rootNode && nodes.length > 0) {
        const sorted = [...nodes].sort((a, b) => a.slot - b.slot);
        rootNode = nodeMap.get(sorted[0].root);
      }

      return rootNode;
    }

    function flattenTree(node, result) {
      if (!node) return result;
      result.push(node);
      if (node.children) {
        node.children.forEach(c => flattenTree(c, result));
      }
      return result;
    }

    function collectLinks(node, links) {
      if (!node || !node.children) return links;
      node.children.forEach(child => {
        links.push({ source: node, target: child });
        collectLinks(child, links);
      });
      return links;
    }

    function layoutTree(rootNode, data) {
      if (!rootNode) return { nodes: [], links: [], width: 0, height: 0 };

      const hierarchy = d3.hierarchy(rootNode, d => d.children);

      const treeLayout = d3.tree().nodeSize([80, SLOT_HEIGHT]);
      treeLayout(hierarchy);

      const allDescendants = hierarchy.descendants();

      const minSlot = d3.min(allDescendants, d => d.data.slot);
      const maxSlot = d3.max(allDescendants, d => d.data.slot);
      const slotRange = maxSlot - minSlot || 1;

      // Stretch toward the viewport for short chains (capped at MAX_SLOT_HEIGHT
      // per slot); fall back to natural SLOT_HEIGHT for long chains (scrollable).
      const containerHeight = Math.max(container.clientHeight - MARGIN.top - MARGIN.bottom, 200);
      const naturalHeight = slotRange * SLOT_HEIGHT;
      const cappedStretch = slotRange * MAX_SLOT_HEIGHT;
      const totalHeight = Math.max(naturalHeight, Math.min(containerHeight, cappedStretch));

      allDescendants.forEach(d => {
        d.y = MARGIN.top + ((d.data.slot - minSlot) / slotRange) * totalHeight;
      });

      let minX = d3.min(allDescendants, d => d.x);
      let maxX = d3.max(allDescendants, d => d.x);
      const treeWidth = maxX - minX;

      const containerWidth = container.clientWidth;
      const centerOffset = containerWidth / 2 - (minX + maxX) / 2;

      allDescendants.forEach(d => {
        d.x += centerOffset;
      });

      const flatNodes = allDescendants.map(d => {
        const roles = nodeRoles(d.data, data);
        return {
          ...d.data,
          x: d.x,
          y: d.y,
          _color: roles.length > 0 ? COLORS[roles[0]] : COLORS.default,
          _ratio: weightRatio(d.data, data.validator_count),
          // Colors of secondary roles, in priority order (after the primary).
          _haloColors: roles.slice(1).map(r => COLORS[r])
        };
      });

      const links = [];
      hierarchy.links().forEach(link => {
        links.push({
          source: { x: link.source.x, y: link.source.y, root: link.source.data.root },
          target: { x: link.target.x, y: link.target.y, root: link.target.data.root }
        });
      });

      minX = d3.min(flatNodes, d => d.x);
      maxX = d3.max(flatNodes, d => d.x);
      const svgWidth = Math.max(containerWidth, maxX - minX + MARGIN.left + MARGIN.right + 60);
      const svgHeight = totalHeight + MARGIN.top + MARGIN.bottom;

      const slots = [];
      for (let s = minSlot; s <= maxSlot; s++) {
        const yPos = MARGIN.top + ((s - minSlot) / slotRange) * totalHeight;
        slots.push({ slot: s, y: yPos });
      }

      return { nodes: flatNodes, links, width: svgWidth, height: svgHeight, slots };
    }

    // Tracked so render() can refresh the tooltip on each poll without
    // requiring the user to move the mouse.
    let hoveredRoot = null;

    function tooltipHtml(d, data) {
      const roles = nodeRoles(d, data);
      const lines = [
        `<span class="tt-label">root:</span> ${truncateRoot(d.root)}`,
        `<span class="tt-label">slot:</span> ${d.slot}`,
        `<span class="tt-label">proposer:</span> ${d.proposer_index}`,
      ];

      if (roles.length > 0) {
        const roleSpans = roles
          .map(r => `<span style="color: ${COLORS[r]}">${ROLE_LABELS[r]}</span>`)
          .join(", ");
        lines.push(`<span class="tt-label">status:</span> ${roleSpans}`);
      }

      // Skip the weight line for purely-finalized blocks: their fork-choice
      // weight is 0 by design and reading "weight: 0" alongside "finalized" is
      // misleading. Any non-finalized role still gets a meaningful number.
      const isPureFinalized = roles.length === 1 && roles[0] === "finalized";
      if (!isPureFinalized) {
        const total = data.validator_count;
        const pct = total ? parseFloat(((d.weight / total) * 100).toFixed(2)) : 0;
        const suffix = total != null ? `/${total} (${pct}%)` : "";
        lines.push(`<span class="tt-label">weight:</span> ${d.weight}${suffix}`);
      }

      return lines.join("<br>");
    }

    function showTooltip(event, d, data) {
      hoveredRoot = d.root;
      tooltip.innerHTML = tooltipHtml(d, data);
      tooltip.style.opacity = 1;
      tooltip.style.left = (event.clientX + 14) + "px";
      tooltip.style.top = (event.clientY - 14) + "px";
    }

    function hideTooltip() {
      hoveredRoot = null;
      tooltip.style.opacity = 0;
    }

    function updateFollowHeadToggle() {
      followHeadToggle.setAttribute("aria-pressed", String(followHead));
      followHeadToggle.textContent = followHead ? "Following Head" : "Follow Head";
    }

    function markProgrammaticScroll() {
      isProgrammaticScroll = true;
      if (programmaticScrollTimeout) clearTimeout(programmaticScrollTimeout);
      programmaticScrollTimeout = setTimeout(() => {
        isProgrammaticScroll = false;
      }, TRANSITION_DURATION + 150);
    }

    function scrollToHead(behavior = "smooth") {
      if (currentHeadScrollTarget == null) return;
      markProgrammaticScroll();
      container.scrollTo({
        top: currentHeadScrollTarget,
        behavior
      });
    }

    function isAtHead() {
      return currentHeadScrollTarget != null &&
        Math.abs(container.scrollTop - currentHeadScrollTarget) <= NODE_RADIUS * 3;
    }

    function setFollowHead(enabled, shouldScroll = false) {
      followHead = enabled;
      updateFollowHeadToggle();

      if (followHead && shouldScroll) {
        scrollToHead();
      }
    }

    function markUserScrollIntent() {
      isProgrammaticScroll = false;
      if (programmaticScrollTimeout) {
        clearTimeout(programmaticScrollTimeout);
        programmaticScrollTimeout = null;
      }
    }

    function render(data) {
      if (!data || !data.nodes || data.nodes.length === 0) {
        emptyMsg.style.display = "block";
        svg.attr("height", 0);
        gLinks.selectAll("*").remove();
        gNodes.selectAll("*").remove();
        gAxis.selectAll("*").remove();
        return;
      }

      emptyMsg.style.display = "none";

      document.getElementById("head-slot").textContent =
        data.nodes.find(n => n.root === data.head)?.slot ?? "--";
      document.getElementById("justified-slot").textContent = data.justified.slot;
      document.getElementById("finalized-slot").textContent = data.finalized.slot;
      document.getElementById("validator-count").textContent = data.validator_count;

      const rootNode = buildTree(data.nodes);
      const layout = layoutTree(rootNode, data);

      svg.attr("height", layout.height);
      svg.attr("width", layout.width);

      // Slot axis labels (show every slot if few, else skip some)
      const slotStep = layout.slots.length > 40 ? Math.ceil(layout.slots.length / 40) : 1;
      const visibleSlots = layout.slots.filter((_, i) => i % slotStep === 0);

      const axisLabels = gAxis.selectAll(".slot-axis-label")
        .data(visibleSlots, d => d.slot);

      axisLabels.exit().remove();

      axisLabels.enter()
        .append("text")
        .attr("class", "slot-axis-label")
        .merge(axisLabels)
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("x", MARGIN.left - 10)
        .attr("y", d => d.y + 4)
        .text(d => `slot ${d.slot}`);

      // Links
      const linkData = layout.links;
      const linkKey = d => `${d.source.root}-${d.target.root}`;

      const links = gLinks.selectAll(".link")
        .data(linkData, linkKey);

      links.exit()
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("opacity", 0)
        .remove();

      const linksEnter = links.enter()
        .append("line")
        .attr("class", "link")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y + NODE_RADIUS)
        .attr("x2", d => d.source.x)
        .attr("y2", d => d.source.y + NODE_RADIUS)
        .attr("opacity", 0);

      links.merge(linksEnter)
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y + NODE_RADIUS)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y - NODE_RADIUS)
        .attr("opacity", 1);

      // Nodes
      const nodeGroups = gNodes.selectAll(".node-group")
        .data(layout.nodes, d => d.root);

      nodeGroups.exit()
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("opacity", 0)
        .remove();

      const nodeEnter = nodeGroups.enter()
        .append("g")
        .attr("class", "node-group")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .attr("opacity", 0);

      nodeEnter.append("circle")
        .attr("class", "node-inner")
        .attr("r", INNER_RADIUS)
        .attr("fill", d => d._color);

      nodeEnter.append("rect")
        .attr("class", "fill-mask")
        .attr("x", -INNER_RADIUS)
        .attr("width", INNER_RADIUS * 2)
        .attr("y", -INNER_RADIUS)
        .attr("height", d => (1 - d._ratio) * INNER_RADIUS * 2);

      nodeEnter.append("circle")
        .attr("class", "node-outer")
        .attr("r", NODE_RADIUS)
        .attr("stroke", d => d._color);

      // Halo rings, one per secondary role. Always rendered with a transparent
      // stroke when no role applies so transitions can animate stroke color
      // smoothly when overlap appears or disappears.
      HALO_OFFSETS.forEach((offset, i) => {
        nodeEnter.append("circle")
          .attr("class", `halo halo-${i}`)
          .attr("r", NODE_RADIUS + offset)
          .attr("stroke", d => d._haloColors[i] || "transparent");
      });

      // Invisible hit target so hover works regardless of fill level. Sized to
      // cover the outermost halo so the cursor still triggers the tooltip when
      // it sits between rings.
      nodeEnter.append("circle")
        .attr("class", "node-hit")
        .attr("r", NODE_RADIUS + MAX_HALO_OFFSET);

      nodeEnter.append("text")
        .attr("class", "node-label")
        .attr("dy", LABEL_DY)
        .text(d => truncateRoot(d.root));

      const nodeMerged = nodeEnter.merge(nodeGroups);

      nodeMerged
        .on("mouseover", function (event, d) { showTooltip(event, d, data); })
        .on("mousemove", function (event, d) { showTooltip(event, d, data); })
        .on("mouseout", hideTooltip);

      nodeMerged
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .attr("opacity", 1);

      // Fill animates first, then color flips once the fill has settled.
      nodeMerged.select(".fill-mask")
        .transition()
        .duration(TRANSITION_DURATION)
        .attr("height", d => (1 - d._ratio) * INNER_RADIUS * 2);

      nodeMerged.select(".node-inner")
        .transition()
        .delay(TRANSITION_DURATION)
        .duration(100)
        .attr("fill", d => d._color);

      nodeMerged.select(".node-outer")
        .transition()
        .delay(TRANSITION_DURATION)
        .duration(100)
        .attr("stroke", d => d._color);

      HALO_OFFSETS.forEach((_, i) => {
        nodeMerged.select(`.halo-${i}`)
          .transition()
          .delay(TRANSITION_DURATION)
          .duration(100)
          .attr("stroke", d => d._haloColors[i] || "transparent");
      });

      nodeMerged.select("text")
        .text(d => truncateRoot(d.root));

      // Keep the tooltip live while the user holds the mouse still over a node.
      if (hoveredRoot) {
        const hovered = layout.nodes.find(n => n.root === hoveredRoot);
        if (hovered) tooltip.innerHTML = tooltipHtml(hovered, data);
      }

      // Auto-scroll to head node if head tracking is enabled.
      const headNode = layout.nodes.find(n => n.root === data.head);
      if (headNode) {
        const containerRect = container.getBoundingClientRect();
        const headY = headNode.y;
        const maxScrollTop = Math.max(0, layout.height - containerRect.height);
        currentHeadScrollTarget = Math.min(
          maxScrollTop,
          Math.max(0, headY - containerRect.height / 2)
        );

        if (followHead) {
          scrollToHead();
        }
      } else {
        currentHeadScrollTarget = null;
      }
    }

    async function fetchAndRender() {
      try {
        const response = await fetch("/lean/v0/fork_choice");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        currentData = data;
        render(data);
      } catch (err) {
        console.error("Failed to fetch fork choice data:", err);
        if (!currentData) {
          emptyMsg.style.display = "block";
        }
      }
    }

    initSVG();
    updateFollowHeadToggle();
    fetchAndRender();
    setInterval(fetchAndRender, POLL_INTERVAL);

    followHeadToggle.addEventListener("click", () => {
      setFollowHead(!followHead, true);
    });

    container.addEventListener("scroll", () => {
      const scrollingUp = container.scrollTop < lastScrollTop - 2;

      if (!isProgrammaticScroll) {
        if (followHead && scrollingUp && !isAtHead()) {
          setFollowHead(false);
        } else if (!followHead && isAtHead()) {
          setFollowHead(true);
        }
      }

      lastScrollTop = container.scrollTop;
    });

    container.addEventListener("wheel", markUserScrollIntent, { passive: true });
    container.addEventListener("pointerdown", markUserScrollIntent, { passive: true });
    container.addEventListener("touchstart", markUserScrollIntent, { passive: true });
    window.addEventListener("keydown", event => {
      if (["ArrowUp", "ArrowDown", "PageUp", "PageDown", "Home", "End", " "].includes(event.key)) {
        markUserScrollIntent();
      }
    });

    window.addEventListener("resize", () => {
      if (currentData) render(currentData);
    });
  </script>
</body>
</html>
